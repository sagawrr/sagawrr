name: Publish README with Last Project

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch: # manual trigger

concurrency:
  group: publish-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          package-manager-cache: false

      - name: Run update script
        run: node .github/scripts/update-readme-v2.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_KEY_7X9K2M }}
          USERNAME: sagawrr

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🔮 MATRIX UPDATE: Neural network synchronized with latest project data" || echo "No changes to commit"
          git push
